<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUVIX AI — Нейросеть нового поколения</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     AUVIX AI — DESIGN SYSTEM
     Palette: #0A0A0A bg · #CCFF00 accent · #1A1A1A surface
     ============================================================ */
  :root {
    --bg:       #0A0A0A;
    --surface:  #111111;
    --border:   #1E1E1E;
    --accent:   #CCFF00;
    --accent2:  #99CC00;
    --text:     #E8E8E8;
    --muted:    #555555;
    --user-bg:  #161616;
    --ai-bg:    #0F1400;
    --radius:   14px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'Space Grotesk', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Grid Background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(204,255,0,.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(204,255,0,.028) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 40%, black 40%, transparent 100%);
  }

  /* ── Glow orb ── */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(204,255,0,.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(10,10,10,.8);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 4px;
    color: var(--text);
    user-select: none;
  }
  .logo span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .05em;
  }
  .status-dot::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .5; transform: scale(.85); }
  }

  .btn-outline {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(204,255,0,.3);
    background: transparent;
    padding: 9px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-outline:hover {
    background: rgba(204,255,0,.06);
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(204,255,0,.15);
  }

  /* ── MAIN LAYOUT ── */
  main {
    position: relative;
    z-index: 1;
    padding-top: 100px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 40px 24px 24px;
    max-width: 900px;
    width: 100%;
  }

  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    opacity: .85;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(80px, 14vw, 160px);
    line-height: .92;
    letter-spacing: 6px;
    color: var(--text);
    text-transform: uppercase;
  }
  .hero-title .accent { color: var(--accent); }

  .hero-sub {
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--muted);
    margin-top: 18px;
    letter-spacing: .02em;
    font-weight: 300;
  }

  /* ── CHAT CONTAINER ── */
  .chat-wrapper {
    width: 100%;
    max-width: 800px;
    padding: 0 20px 40px;
    margin-top: 32px;
  }

  .chat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,.6), 0 0 0 1px rgba(204,255,0,.04);
  }

  /* chat topbar */
  .chat-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,20,0,.3);
  }
  .chat-topbar-left {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: .08em;
  }
  .chat-topbar-left svg { width: 16px; height: 16px; fill: var(--accent); }
  .model-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .1em;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
  }

  /* messages area */
  #messages {
    height: 380px;
    overflow-y: auto;
    padding: 24px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* message bubbles */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeUp .3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .msg.ai .msg-label { color: var(--accent); opacity: .7; }

  .msg-bubble {
    padding: 13px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.65;
    letter-spacing: .01em;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid rgba(204,255,0,.12);
    color: var(--text);
  }

  /* typing cursor */
  .typing-cursor::after {
    content: '▋';
    color: var(--accent);
    animation: blink .7s step-end infinite;
    margin-left: 1px;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: .35;
    padding: 40px 0;
    text-align: center;
  }
  .empty-state svg { width: 40px; height: 40px; opacity: .5; }
  .empty-state p {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: .1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* input area */
  .chat-input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,10,.5);
  }
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  #userInput {
    flex: 1;
    background: #0E0E0E;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 13px 16px;
    resize: none;
    min-height: 48px;
    max-height: 140px;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    line-height: 1.5;
  }
  #userInput:focus {
    border-color: rgba(204,255,0,.45);
    box-shadow: 0 0 0 3px rgba(204,255,0,.07), 0 0 20px rgba(204,255,0,.08);
  }
  #userInput::placeholder { color: #383838; }

  .send-btn {
    width: 48px; height: 48px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }
  .send-btn:hover {
    background: #d9ff1a;
    box-shadow: 0 0 20px rgba(204,255,0,.4);
    transform: scale(1.05);
  }
  .send-btn:active { transform: scale(.96); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; fill: #0A0A0A; }

  .input-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .08em;
  }

  /* ── PROMPT CHIPS ── */
  .chips-section {
    width: 100%;
    max-width: 800px;
    padding: 0 20px 60px;
  }
  .chips-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .chips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 10px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
  }
  .chip:hover {
    border-color: rgba(204,255,0,.3);
    background: rgba(204,255,0,.04);
    box-shadow: 0 0 16px rgba(204,255,0,.08);
    transform: translateY(-1px);
  }
  .chip-icon {
    font-size: 20px;
    margin-bottom: 8px;
    display: block;
  }
  .chip-title {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }
  .chip-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .04em;
  }

  /* ── ERROR TOAST ── */
  #toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: #1A0000;
    border: 1px solid #440000;
    color: #FF6B6B;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 12px 18px;
    border-radius: 8px;
    max-width: 320px;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all .25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    header { padding: 16px 20px; }
    .hero { padding: 28px 16px 16px; }
    .hero-title { font-size: 72px; letter-spacing: 3px; }
    .chat-wrapper, .chips-section { padding-left: 12px; padding-right: 12px; }
    #messages { height: 300px; }
    .chips-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header>
  <div class="logo">AUVIX<span>.</span>AI</div>
  <div class="header-right">
    <div class="status-dot">ONLINE</div>
    <button class="btn-outline" onclick="document.getElementById('userInput').focus()">ЗАПУСТИТЬ</button>
  </div>
</header>

<!-- ══════════════ MAIN ══════════════ -->
<main>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-eyebrow">// Нейросеть нового поколения</div>
    <h1 class="hero-title">AUVIX<br><span class="accent">AI</span></h1>
    <p class="hero-sub">Задавай вопросы. Получай ответы. Без ограничений.</p>
  </section>

  <!-- CHAT -->
  <div class="chat-wrapper">
    <div class="chat-box">

      <!-- topbar -->
      <div class="chat-topbar">
        <div class="chat-topbar-left">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
          AUVIX CORE
        </div>
        <span class="model-badge" id="modelBadge">ЗАГРУЗКА...</span>
      </div>

      <!-- messages -->
      <div id="messages">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <p>Начните диалог</p>
        </div>
      </div>

      <!-- input -->
      <div class="chat-input-area">
        <div class="input-row">
          <textarea id="userInput" rows="1" placeholder="Введите сообщение..." 
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-meta">
          <span id="statusText">Готов к работе</span>
          <span>Enter — отправить &nbsp;·&nbsp; Shift+Enter — новая строка</span>
        </div>
      </div>

    </div>
  </div>

  <!-- CHIPS -->
  <div class="chips-section">
    <div class="chips-label">// Быстрые запросы</div>
    <div class="chips-grid" id="chipsGrid"></div>
  </div>

</main>

<!-- TOAST -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════════════════
     JAVASCRIPT — AI ENGINE
     ──────────────────────────────────────────────────────────
     НАСТРОЙКА API-КЛЮЧЕЙ:

     Для Hugging Face (бесплатно, без ключа для многих моделей):
       Создайте токен на https://huggingface.co/settings/tokens
       и вставьте его в HF_TOKEN ниже.
       Если оставить пустым — запросы идут без авторизации
       (работает для публичных моделей с ограниченным rate-limit).

     Для OpenAI-совместимых прокси/зеркал:
       Добавьте запись в PROVIDERS с нужным baseUrl и apiKey.
       Примеры работающих в РФ зеркал на момент публикации:
         https://api.proxyapi.ru/openai/v1   (proxyapi.ru — российский прокси)
         https://openrouter.ai/api/v1        (openrouter.ai — работает через CDN)

     Переключение между провайдерами происходит АВТОМАТИЧЕСКИ:
       При ошибке 4xx/5xx или таймауте скрипт пробует следующий.
     ════════════════════════════════════════════════════════ -->
<script>
"use strict";

// ──────────────────────────────────────────────────────────────
//  🔑  API KEYS — ВСТАВЬТЕ СВОИ КЛЮЧИ ЗДЕСЬ
// ──────────────────────────────────────────────────────────────
const HF_TOKEN      = "";  // Hugging Face токен (необязательно для бесплатных моделей)
const OPENROUTER_KEY = "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"; // OpenRouter ключ (бесплатный тариф есть: openrouter.ai)
const PROXYAPI_KEY   = ""; // proxyapi.ru ключ (российский прокси OpenAI)
// ──────────────────────────────────────────────────────────────

// ──────────────────────────────────────────────────────────────
//  📋  СПИСОК ПРОВАЙДЕРОВ (порядок = приоритет fallback)
//  type: "hf-chat"     → Hugging Face Chat Completion API
//  type: "openai"      → OpenAI-совместимый эндпоинт
// ──────────────────────────────────────────────────────────────
const PROVIDERS = [
  {
    id: "openrouter-free",
    label: "OpenRouter",
    type: "openai",
    baseUrl: "https://openrouter.ai/api/v1",
    model: "mistralai/mistral-7b-instruct:free",
    apiKey: OPENROUTER_KEY,
    headers: {
      "HTTP-Referer": window.location.href,
      "X-Title": "Auvix AI"
    }
  },
  {
    id: "hf-mistral",
    label: "Mistral 7B",
    type: "hf-chat",
    model: "mistralai/Mistral-7B-Instruct-v0.3",
    apiKey: HF_TOKEN,
  },
  {
    id: "hf-zephyr",
    label: "Zephyr β",
    type: "hf-chat",
    model: "HuggingFaceH4/zephyr-7b-beta",
    apiKey: HF_TOKEN,
  },
  {
    id: "hf-llama",
    label: "Llama 3.1 8B",
    type: "hf-chat",
    model: "meta-llama/Llama-3.1-8B-Instruct",
    apiKey: HF_TOKEN,
  },
  {
    id: "proxyapi",
    label: "ProxyAPI RU",
    type: "openai",
    baseUrl: "https://api.proxyapi.ru/openai/v1",
    model: "gpt-4o-mini",
    apiKey: PROXYAPI_KEY,
  }
];

// ──────────────────────────────────────────────────────────────
//  ⚙️  STATE
// ──────────────────────────────────────────────────────────────
let conversationHistory = [];  // накапливаем контекст диалога
let currentProviderIdx  = 0;   // текущий активный провайдер
let isBusy = false;

const modelBadge  = document.getElementById("modelBadge");
const statusText  = document.getElementById("statusText");
const sendBtn     = document.getElementById("sendBtn");
const messagesEl  = document.getElementById("messages");
const emptyState  = document.getElementById("emptyState");
const userInput   = document.getElementById("userInput");
const toast       = document.getElementById("toast");

// Инициализируем badge
function updateBadge() {
  const p = PROVIDERS[currentProviderIdx];
  modelBadge.textContent = p ? p.label.toUpperCase() : "—";
}
updateBadge();

// ──────────────────────────────────────────────────────────────
//  📦  CHIPS ДАННЫЕ
// ──────────────────────────────────────────────────────────────
const CHIPS = [
  { icon: "💻", title: "Напиши код",    sub: "HTML / Python / JS",   text: "Напиши пример кода на Python для парсинга веб-страницы с помощью BeautifulSoup." },
  { icon: "💡", title: "Придумай идею", sub: "Стартап / проект",      text: "Придумай 5 нестандартных идей для SaaS-стартапа в сфере ИИ." },
  { icon: "🌐", title: "Переведи текст", sub: "EN / RU / DE / FR",    text: "Переведи на английский язык: «Искусственный интеллект меняет мир быстрее, чем мы успеваем адаптироваться.»" },
  { icon: "✍️",  title: "Напиши текст", sub: "Пост / письмо / статья", text: "Напиши убедительный пост для LinkedIn о важности непрерывного обучения в эпоху ИИ." },
  { icon: "🔍", title: "Объясни просто", sub: "Сложные темы — легко",  text: "Объясни простыми словами, как работает большая языковая модель (LLM)." },
  { icon: "📊", title: "Анализ данных",  sub: "SQL / Excel / Python",  text: "Покажи пример SQL-запроса для подсчёта конверсии по источникам трафика за последние 30 дней." },
  { icon: "🎨", title: "Prompt для ИИ", sub: "Midjourney / DALL-E",    text: "Составь детальный prompt для Midjourney: футуристичный город ночью в стиле киберпанк." },
  { icon: "🤖", title: "Системный промпт", sub: "ChatGPT / Claude",   text: "Напиши системный промпт для ИИ-ассистента, который помогает стартапам находить инвесторов." },
];

// Рендерим chips
const chipsGrid = document.getElementById("chipsGrid");
CHIPS.forEach(chip => {
  const el = document.createElement("div");
  el.className = "chip";
  el.innerHTML = `
    <span class="chip-icon">${chip.icon}</span>
    <div class="chip-title">${chip.title}</div>
    <div class="chip-sub">${chip.sub}</div>
  `;
  el.addEventListener("click", () => {
    userInput.value = chip.text;
    autoResize(userInput);
    userInput.focus();
    userInput.scrollTop = userInput.scrollHeight;
  });
  chipsGrid.appendChild(el);
});

// ──────────────────────────────────────────────────────────────
//  🖊️  UI HELPERS
// ──────────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showToast(msg, duration = 4000) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), duration);
}

function appendMessage(role, text, animate = false) {
  // Убираем empty state
  if (emptyState) emptyState.style.display = "none";

  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "user" ? "ВЫ" : "AUVIX AI";

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";

  if (animate) {
    bubble.classList.add("typing-cursor");
    bubble.textContent = "";
  } else {
    bubble.innerHTML = formatText(text);
  }

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

// Простое форматирование: **bold**, `code`
function formatText(text) {
  return text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/`([^`]+)`/g, "<code style='font-family:var(--font-mono);font-size:12px;background:rgba(204,255,0,.08);padding:1px 5px;border-radius:3px;'>$1</code>")
    .replace(/\n/g, "<br>");
}

// Анимированный вывод текста посимвольно
async function typeText(bubble, text) {
  const formatted = formatText(text);
  // Выводим по ~4 символа за тик для скорости
  const chunk = 3;
  let i = 0;
  const raw = text; // печатаем сырой текст, потом заменим на форматированный
  bubble.textContent = "";
  return new Promise(resolve => {
    function tick() {
      if (i < raw.length) {
        i = Math.min(i + chunk, raw.length);
        bubble.textContent = raw.slice(0, i);
        scrollToBottom();
        requestAnimationFrame(tick);
      } else {
        bubble.classList.remove("typing-cursor");
        bubble.innerHTML = formatted;
        scrollToBottom();
        resolve();
      }
    }
    requestAnimationFrame(tick);
  });
}

// ──────────────────────────────────────────────────────────────
//  🤖  AI REQUEST — HUGGING FACE CHAT COMPLETION
// ──────────────────────────────────────────────────────────────
async function callHFChat(provider, messages, signal) {
  const url = `https://api-inference.huggingface.co/models/${provider.model}/v1/chat/completions`;
  const headers = {
    "Content-Type": "application/json",
  };
  if (provider.apiKey) headers["Authorization"] = `Bearer ${provider.apiKey}`;

  const body = JSON.stringify({
    model: provider.model,
    messages,
    max_tokens: 1024,
    temperature: 0.7,
    stream: false,
  });

  const res = await fetch(url, { method: "POST", headers, body, signal });
  if (!res.ok) {
    const errText = await res.text().catch(() => "");
    throw new Error(`HF ${res.status}: ${errText.slice(0, 120)}`);
  }
  const data = await res.json();
  const content = data?.choices?.[0]?.message?.content;
  if (!content) throw new Error("Пустой ответ от HF");
  return content.trim();
}

// ──────────────────────────────────────────────────────────────
//  🤖  AI REQUEST — OpenAI-COMPATIBLE
// ──────────────────────────────────────────────────────────────
async function callOpenAI(provider, messages, signal) {
  if (!provider.apiKey) throw new Error("API ключ не задан для " + provider.id);

  const url = `${provider.baseUrl}/chat/completions`;
  const headers = {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${provider.apiKey}`,
    ...(provider.headers || {}),
  };
  const body = JSON.stringify({
    model: provider.model,
    messages,
    max_tokens: 1024,
    temperature: 0.7,
  });

  const res = await fetch(url, { method: "POST", headers, body, signal });
  if (!res.ok) {
    const errText = await res.text().catch(() => "");
    throw new Error(`OpenAI-compat ${res.status}: ${errText.slice(0, 120)}`);
  }
  const data = await res.json();
  const content = data?.choices?.[0]?.message?.content;
  if (!content) throw new Error("Пустой ответ");
  return content.trim();
}

// ──────────────────────────────────────────────────────────────
//  🔄  FALLBACK LOOP — перебираем провайдеров по очереди
// ──────────────────────────────────────────────────────────────
async function askAI(messages) {
  const TIMEOUT_MS = 20000;

  for (let i = 0; i < PROVIDERS.length; i++) {
    const idx      = (currentProviderIdx + i) % PROVIDERS.length;
    const provider = PROVIDERS[idx];

    statusText.textContent = `Запрос к ${provider.label}...`;
    updateBadge();

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);

    try {
      let result;
      if (provider.type === "hf-chat") {
        result = await callHFChat(provider, messages, controller.signal);
      } else if (provider.type === "openai") {
        result = await callOpenAI(provider, messages, controller.signal);
      }
      clearTimeout(timer);
      currentProviderIdx = idx; // запоминаем рабочий провайдер
      updateBadge();
      return result;
    } catch (err) {
      clearTimeout(timer);
      console.warn(`[Auvix] Провайдер ${provider.id} не ответил:`, err.message);
      // Пробуем следующий
    }
  }

  throw new Error("Все провайдеры недоступны. Проверьте API-ключи или попробуйте позже.");
}

// ──────────────────────────────────────────────────────────────
//  📤  SEND MESSAGE
// ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isBusy) return;

  isBusy = true;
  sendBtn.disabled = true;
  userInput.disabled = true;

  // Рендерим сообщение пользователя
  appendMessage("user", text);
  conversationHistory.push({ role: "user", content: text });

  userInput.value = "";
  autoResize(userInput);

  // Рендерим placeholder для ответа ИИ
  const aiBubble = appendMessage("ai", "", true);
  statusText.textContent = "ИИ думает...";

  try {
    const reply = await askAI([
      {
        role: "system",
        content: "Ты — Auvix AI, умный и полезный ИИ-ассистент. Отвечай на языке пользователя. Будь точным, полезным и лаконичным."
      },
      ...conversationHistory
    ]);

    conversationHistory.push({ role: "assistant", content: reply });
    await typeText(aiBubble, reply);
    statusText.textContent = "Готов к работе";
  } catch (err) {
    aiBubble.classList.remove("typing-cursor");
    aiBubble.innerHTML = `<span style="color:#FF6B6B">⚠ ${err.message}</span>`;
    showToast("⚠ " + err.message);
    statusText.textContent = "Ошибка — попробуйте снова";
    console.error("[Auvix Error]", err);
  } finally {
    isBusy = false;
    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }
}
