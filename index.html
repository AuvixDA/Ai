<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUVIX AI — Нейросеть нового поколения</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0A0A0A;
    --surface: #111111;
    --border:  #1E1E1E;
    --accent:  #CCFF00;
    --text:    #E8E8E8;
    --muted:   #555555;
    --radius:  14px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono:    'DM Mono', monospace;
    --font-body:    'Space Grotesk', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: clip;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(204,255,0,.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(204,255,0,.028) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 40%, black 40%, transparent 100%);
  }

  body::after {
    content: '';
    position: fixed; top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(204,255,0,.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }



  main {
    position: relative; z-index: 1;
    padding-top: 24px;
    display: flex; flex-direction: column; align-items: center;
  }

  .hero {
    text-align: center; padding: 32px 24px 16px;
    max-width: 900px; width: 100%;
  }
  .hero-eyebrow {
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: .25em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px; opacity: .85;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(72px, 13vw, 148px);
    line-height: .92; letter-spacing: 6px; text-transform: uppercase;
    color: var(--text);
  }
  .hero-title .accent { color: var(--accent); }
  .hero-sub {
    font-size: 15px; color: var(--muted);
    margin-top: 16px; letter-spacing: .02em; font-weight: 300;
  }

  .chat-wrapper {
    width: 100%; max-width: 800px;
    padding: 0 20px 32px; margin-top: 28px;
  }
  .chat-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,.6), 0 0 0 1px rgba(204,255,0,.04);
  }

  .chat-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: rgba(15,20,0,.3);
  }
  .chat-topbar-left {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--accent); letter-spacing: .08em;
  }
  .chat-topbar-left svg { width:16px; height:16px; fill:var(--accent); }
  .model-badge {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: .1em; color: var(--muted);
    border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px;
  }

  #messages {
    height: 400px; overflow-y: auto;
    padding: 24px 24px 8px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex; flex-direction: column; max-width: 85%;
    animation: fadeUp .3s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .msg.user { align-self:flex-end; align-items:flex-end; }
  .msg.ai   { align-self:flex-start; align-items:flex-start; }

  .msg-label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .msg.ai .msg-label { color: var(--accent); opacity: .7; }

  .msg-bubble {
    padding: 13px 18px; border-radius: 10px;
    font-size: 14px; line-height: 1.7;
  }
  .msg.user .msg-bubble {
    background: #161616; border: 1px solid var(--border); color: var(--text);
  }
  .msg.ai .msg-bubble {
    background: #0F1400; border: 1px solid rgba(204,255,0,.12); color: var(--text);
  }

  .typing-cursor::after {
    content: '▋'; color: var(--accent);
    animation: blink .7s step-end infinite; margin-left: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

  .empty-state {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:10px; opacity:.3; padding:40px 0; text-align:center;
  }
  .empty-state svg { width:40px; height:40px; }
  .empty-state p {
    font-family: var(--font-mono); font-size:12px;
    letter-spacing:.1em; color:var(--muted); text-transform:uppercase;
  }

  .chat-input-area {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: rgba(10,10,10,.5);
  }
  .input-row { display:flex; align-items:flex-end; gap:10px; }
  #userInput {
    flex:1; background:#0E0E0E; border:1px solid var(--border);
    border-radius:10px; color:var(--text);
    font-family:var(--font-body); font-size:14px;
    padding:13px 16px; resize:none;
    min-height:48px; max-height:140px;
    transition: border-color .2s, box-shadow .2s;
    outline:none; line-height:1.5;
  }
  #userInput:focus {
    border-color: rgba(204,255,0,.45);
    box-shadow: 0 0 0 3px rgba(204,255,0,.07), 0 0 20px rgba(204,255,0,.08);
  }
  #userInput::placeholder { color:#383838; }

  .send-btn {
    width:48px; height:48px; background:var(--accent);
    border:none; border-radius:10px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all .2s;
  }
  .send-btn:hover {
    background:#d9ff1a; box-shadow:0 0 20px rgba(204,255,0,.4); transform:scale(1.05);
  }
  .send-btn:active { transform:scale(.96); }
  .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .send-btn svg { width:18px; height:18px; fill:#0A0A0A; }

  .input-meta {
    display:flex; align-items:center; justify-content:space-between;
    margin-top:10px; font-family:var(--font-mono);
    font-size:10px; color:var(--muted); letter-spacing:.08em;
  }

  .chips-section { width:100%; max-width:800px; padding:0 20px 60px; }
  .chips-label {
    font-family:var(--font-mono); font-size:10px;
    letter-spacing:.2em; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px;
  }
  .chips-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(190px,1fr));
    gap:10px;
  }
  .chip {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px;
    cursor:pointer; transition:all .2s; text-align:left;
  }
  .chip:hover {
    border-color:rgba(204,255,0,.3); background:rgba(204,255,0,.04);
    box-shadow:0 0 16px rgba(204,255,0,.08); transform:translateY(-1px);
  }
  .chip-icon { font-size:20px; margin-bottom:8px; display:block; }
  .chip-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:3px; }
  .chip-sub { font-family:var(--font-mono); font-size:10px; color:var(--muted); }

  #toast {
    position:fixed; bottom:28px; right:28px;
    background:#1A0000; border:1px solid #440000; color:#FF6B6B;
    font-family:var(--font-mono); font-size:12px;
    padding:12px 18px; border-radius:8px; max-width:360px;
    z-index:999; opacity:0; transform:translateY(10px);
    transition:all .25s; pointer-events:none; line-height:1.5;
  }
  #toast.show { opacity:1; transform:translateY(0); }

  @media(max-width:640px){
    header { padding:16px 20px; }
    .hero { padding:20px 16px 12px; }
    .hero-title { font-size:68px; letter-spacing:2px; }
    .chat-wrapper, .chips-section { padding-left:12px; padding-right:12px; }
    #messages { height:300px; }
    .chips-grid { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<main>
  <section class="hero">
    <div class="hero-eyebrow">// Нейросеть нового поколения</div>
    <h1 class="hero-title">AUVIX<br><span class="accent">AI</span></h1>
    <p class="hero-sub">Задавай вопросы. Получай ответы. Без ограничений.</p>
  </section>

  <div class="chat-wrapper">
    <div class="chat-box">
      <div class="chat-topbar">
        <div class="chat-topbar-left">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
          AUVIX CORE
        </div>
        <span class="model-badge" id="modelBadge">AUTO</span>
      </div>

      <div id="messages">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <p>Начните диалог</p>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="input-row">
          <textarea id="userInput" rows="1" placeholder="Введите сообщение..."
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-meta">
          <span id="statusText">Готов к работе</span>
          <span>Enter — отправить · Shift+Enter — строка</span>
        </div>
      </div>
    </div>
  </div>

  <div class="chips-section">
    <div class="chips-label">// Быстрые запросы</div>
    <div class="chips-grid" id="chipsGrid"></div>
  </div>
</main>

<div id="toast"></div>

<script>
"use strict";

// ════════════════════════════════════════════
//  ВСТАВЬТЕ НОВЫЙ КЛЮЧ OPENROUTER СЮДА:
//  Получить: https://openrouter.ai/settings/keys
// ════════════════════════════════════════════
const OR_KEY = "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";
// ════════════════════════════════════════════

// Провайдеры в порядке приоритета
const PROVIDERS = [
  // openrouter/free — автоматически выбирает лучшую свободную модель
  { id:"or-auto",    label:"AUTO",       model:"openrouter/free" },
  // Конкретные модели как резерв
  { id:"or-llama",   label:"LLAMA 3.1",  model:"meta-llama/llama-3.1-8b-instruct:free" },
  { id:"or-gemma",   label:"GEMMA 2",    model:"google/gemma-2-9b-it:free" },
  { id:"or-qwen",    label:"QWEN 2.5",   model:"qwen/qwen-2.5-7b-instruct:free" },
  { id:"or-mistral", label:"MISTRAL",    model:"mistralai/mistral-7b-instruct:free" },
];

let chatHistory = [];
let provIdx     = 0;
let busy        = false;

const badgeEl  = document.getElementById("modelBadge");
const statusEl = document.getElementById("statusText");
const sendBtn  = document.getElementById("sendBtn");
const msgEl    = document.getElementById("messages");
const emptyEl  = document.getElementById("emptyState");
const inputEl  = document.getElementById("userInput");
const toastEl  = document.getElementById("toast");

function setBadge(label) { badgeEl.textContent = label; }

// Chips
const CHIPS = [
  { icon:"💻", title:"Напиши код",       sub:"Python / JS / HTML",   text:"Напиши пример кода на Python для парсинга веб-страницы с помощью BeautifulSoup." },
  { icon:"💡", title:"Придумай идею",    sub:"Стартап / проект",      text:"Придумай 5 нестандартных идей для SaaS-стартапа в сфере ИИ." },
  { icon:"🌐", title:"Переведи текст",   sub:"EN / RU / DE / FR",     text:"Переведи на английский: «Искусственный интеллект меняет мир быстрее, чем мы успеваем адаптироваться.»" },
  { icon:"✍️", title:"Напиши пост",      sub:"LinkedIn / Telegram",   text:"Напиши убедительный пост для LinkedIn о важности непрерывного обучения в эпоху ИИ." },
  { icon:"🔍", title:"Объясни просто",   sub:"Сложные темы — легко",  text:"Объясни простыми словами, как работает большая языковая модель (LLM)." },
  { icon:"📊", title:"Анализ данных",    sub:"SQL / Excel / Python",  text:"Покажи пример SQL-запроса для подсчёта конверсии по источникам трафика за 30 дней." },
  { icon:"🎨", title:"Prompt для ИИ",    sub:"Midjourney / DALL-E",   text:"Составь детальный prompt для Midjourney: футуристичный ночной город в стиле киберпанк." },
  { icon:"🤖", title:"Системный промпт", sub:"ChatGPT / Claude",      text:"Напиши системный промпт для ИИ-ассистента, который помогает стартапам находить инвесторов." },
];
const grid = document.getElementById("chipsGrid");
CHIPS.forEach(c => {
  const el = document.createElement("div");
  el.className = "chip";
  el.innerHTML = `<span class="chip-icon">${c.icon}</span><div class="chip-title">${c.title}</div><div class="chip-sub">${c.sub}</div>`;
  el.onclick = () => { inputEl.value = c.text; autoResize(inputEl); inputEl.focus(); };
  grid.appendChild(el);
});

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 140) + "px";
}
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function scrollBottom() { msgEl.scrollTop = msgEl.scrollHeight; }

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 6000);
}

function addMessage(role, text, typing) {
  if (emptyEl) emptyEl.style.display = "none";
  const wrap   = document.createElement("div");
  wrap.className = "msg " + role;
  const lbl    = document.createElement("div");
  lbl.className = "msg-label";
  lbl.textContent = role === "user" ? "ВЫ" : "AUVIX AI";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  if (typing) {
    bubble.classList.add("typing-cursor");
  } else {
    bubble.innerHTML = fmt(text);
  }
  wrap.append(lbl, bubble);
  msgEl.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function fmt(t) {
  return t
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code style='font-family:var(--font-mono);font-size:12px;background:rgba(204,255,0,.1);padding:1px 6px;border-radius:3px;color:var(--accent)'>$1</code>")
    .replace(/\n/g,"<br>");
}

async function typeText(bubble, text) {
  bubble.classList.add("typing-cursor");
  let i = 0;
  await new Promise(r => {
    (function tick() {
      if (i < text.length) {
        i = Math.min(i + 5, text.length);
        bubble.textContent = text.slice(0, i);
        scrollBottom();
        requestAnimationFrame(tick);
      } else {
        bubble.classList.remove("typing-cursor");
        bubble.innerHTML = fmt(text);
        scrollBottom();
        r();
      }
    })();
  });
}

// API запрос к одному провайдеру
async function callOne(provider, messages, signal) {
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    signal,
    headers: {
      "Content-Type":  "application/json",
      "Authorization": "Bearer " + OR_KEY,
      "HTTP-Referer":  "https://auvixda.github.io/Ai/",
      "X-Title":       "Auvix AI",
    },
    body: JSON.stringify({
      model:       provider.model,
      messages,
      max_tokens:  1200,
      temperature: 0.7,
    }),
  });

  const data = await res.json();

  // Если OpenRouter вернул ошибку в теле
  if (data.error) {
    throw new Error(data.error.message || JSON.stringify(data.error));
  }
  if (!res.ok) {
    throw new Error("HTTP " + res.status);
  }

  const content = data?.choices?.[0]?.message?.content;
  if (!content) throw new Error("Пустой ответ");
  return content.trim();
}

// Fallback loop
async function askAI(messages) {
  for (let i = 0; i < PROVIDERS.length; i++) {
    const idx = (provIdx + i) % PROVIDERS.length;
    const p   = PROVIDERS[idx];

    statusEl.textContent = "Запрос к " + p.label + "…";
    setBadge(p.label);

    const ctrl  = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 25000);

    try {
      const result = await callOne(p, messages, ctrl.signal);
      clearTimeout(timer);
      provIdx = idx;
      return result;
    } catch(e) {
      clearTimeout(timer);
      console.warn("[Auvix]", p.id, "→", e.message);
    }
  }
  throw new Error("Все провайдеры недоступны. Обновите API-ключ на openrouter.ai");
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  if (OR_KEY === "ВСТАВЬТЕ_КЛЮЧ_СЮДА") {
    showToast("⚠ Сначала вставьте API-ключ OpenRouter в код (переменная OR_KEY)");
    return;
  }

  busy = true;
  sendBtn.disabled  = true;
  inputEl.disabled  = true;

  addMessage("user", text);
  chatHistory.push({ role:"user", content:text });
  inputEl.value = "";
  autoResize(inputEl);

  const bubble = addMessage("ai", "", true);
  statusEl.textContent = "ИИ думает…";

  try {
    const reply = await askAI([
      { role:"system", content:"Ты — Auvix AI, умный и полезный ассистент. Отвечай на языке пользователя. Будь точным, структурированным и лаконичным." },
      ...chatHistory,
    ]);
    chatHistory.push({ role:"assistant", content:reply });
    await typeText(bubble, reply);
    statusEl.textContent = "Готов к работе";
  } catch(e) {
    bubble.classList.remove("typing-cursor");
    bubble.innerHTML = '<span style="color:#FF6B6B">⚠ ' + e.message + '</span>';
    showToast("⚠ " + e.message);
    statusEl.textContent = "Ошибка";
    console.error("[Auvix]", e);
  } finally {
    busy = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
